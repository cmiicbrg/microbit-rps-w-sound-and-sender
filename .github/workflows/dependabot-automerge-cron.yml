name: Dependabot Auto-merge (Cron)

on:
  schedule:
    # Run daily at 20:00 UTC
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  check-aged-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find and merge eligible Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          # Get all open Dependabot PRs
          prs=$(gh pr list --author "dependabot[bot]" --state open --json number,createdAt,headRefName,labels --repo "$GITHUB_REPOSITORY")
          
          if [ "$prs" = "[]" ]; then
            echo "No open Dependabot PRs found."
            exit 0
          fi
          
          echo "Found $(echo "$prs" | jq length) open Dependabot PR(s)"
          echo ""
          
          now_ts=$(date +%s)
          quarantine_days=3
          
          echo "$prs" | jq -c '.[]' | while read -r pr; do
            pr_number=$(echo "$pr" | jq -r '.number')
            created_at=$(echo "$pr" | jq -r '.createdAt')
            branch=$(echo "$pr" | jq -r '.headRefName')
            labels=$(echo "$pr" | jq -r '.labels[].name' 2>/dev/null || echo "")
            
            created_ts=$(date -d "$created_at" +%s)
            age_days=$(( (now_ts - created_ts) / 86400 ))
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "PR #$pr_number ($branch)"
            echo "  Created: $created_at"
            echo "  Age: $age_days day(s)"
            echo "  Labels: $labels"
            
            # Check quarantine
            if [ "$age_days" -lt "$quarantine_days" ]; then
              echo "  ⏳ Still in quarantine ($age_days < $quarantine_days days)"
              continue
            fi
            echo "  ✅ Quarantine passed"
            
            # Check if it's npm, github-actions, devcontainers, or docker
            is_npm=false
            is_gha=false
            is_devcontainer=false
            is_docker=false
            echo "$labels" | grep -q "npm" && is_npm=true
            echo "$labels" | grep -q "github-actions" && is_gha=true
            echo "$labels" | grep -q "devcontainers" && is_devcontainer=true
            echo "$labels" | grep -q "docker" && is_docker=true
            
            if [ "$is_npm" = "false" ] && [ "$is_gha" = "false" ] && [ "$is_devcontainer" = "false" ] && [ "$is_docker" = "false" ]; then
              echo "  ⏭️  Skipping: not npm, github-actions, devcontainers, or docker"
              continue
            fi
            
            # For npm PRs, check for new dependencies
            if [ "$is_npm" = "true" ]; then
              echo "  🔍 Checking for new dependencies..."
              
              # Fetch the PR branch
              git fetch origin "pull/$pr_number/head:pr-$pr_number" --quiet
              
              # Run lockfile diff check
              new_deps=$(PR_NUMBER=$pr_number node << 'NODESCRIPT'
          const fs = require('fs');
          const { execSync } = require('child_process');

          function extractDeps(lockfile) {
            const deps = new Set();
            if (!lockfile.packages) return deps;
            for (const key of Object.keys(lockfile.packages)) {
              if (key === '') continue;
              const match = key.match(/node_modules\/(.+)$/);
              if (match) {
                let pkgPath = match[1];
                const lastNM = pkgPath.lastIndexOf('node_modules/');
                if (lastNM !== -1) pkgPath = pkgPath.slice(lastNM + 13);
                deps.add(pkgPath);
              }
            }
            return deps;
          }

          const prBranch = 'pr-' + process.env.PR_NUMBER;
          const baseBranch = execSync('git symbolic-ref refs/remotes/origin/HEAD', { encoding: 'utf8' }).trim();
          
          // Find lockfiles in the PR
          let lockfiles = [];
          try {
            const output = execSync(`git ls-tree -r --name-only ${prBranch}`, { encoding: 'utf8' });
            lockfiles = output.split('\n').filter(f => f.endsWith('package-lock.json'));
          } catch (e) {
            console.error('Failed to list lockfiles: ' + e.message);
            process.exit(1);
          }

          let newDeps = [];
          for (const lf of lockfiles) {
            try {
              const baseContent = execSync(`git show ${baseBranch}:${lf}`, { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] });
              const prContent = execSync(`git show ${prBranch}:${lf}`, { encoding: 'utf8', stdio: ['pipe', 'pipe', 'pipe'] });
              const baseLock = JSON.parse(baseContent);
              const prLock = JSON.parse(prContent);
              const baseDeps = extractDeps(baseLock);
              const prDeps = extractDeps(prLock);
              for (const d of prDeps) {
                if (!baseDeps.has(d)) newDeps.push(d);
              }
            } catch (e) {
              console.error('Failed to verify ' + lf + ': ' + e.message);
              newDeps.push(lf + ':verification-failed');
            }
          }

          if (newDeps.length > 0) {
            console.log(newDeps.join(','));
            process.exit(1);
          }
          process.exit(0);
          NODESCRIPT
              ) && lockfile_ok=true || lockfile_ok=false
              
              if [ "$lockfile_ok" = "false" ]; then
                echo "  ❌ New dependencies detected: $new_deps"
                echo "  ⏭️  Skipping: requires manual review"
                continue
              fi
              echo "  ✅ No new dependencies"
            fi
            
            echo "  🚀 Enabling auto-merge..."
            gh pr merge "$pr_number" --auto --merge --repo "$GITHUB_REPOSITORY" || echo "  ⚠️  Could not enable auto-merge (may already be enabled or blocked)"
            
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Done."
