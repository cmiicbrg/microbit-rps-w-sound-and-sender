name: Dependabot Auto-merge (Cron)

on:
  schedule:
    # Run at 00:49, 08:49, and 16:49 UTC
    - cron: '49 0,8,16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  check-aged-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/cron@e371deee6efcd7b2cb3eb8b059286705118cd4b0 # v1.5.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
