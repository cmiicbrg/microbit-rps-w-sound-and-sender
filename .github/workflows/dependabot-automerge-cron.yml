name: Dependabot Auto-merge (Cron)

on:
  schedule:
    # Run at 00:49, 08:49, and 16:49 UTC
    - cron: '49 0,8,16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  check-aged-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/cron@3fa782b8001d74e4f492bd10c2516e44b379a6a3 # v1.8.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
