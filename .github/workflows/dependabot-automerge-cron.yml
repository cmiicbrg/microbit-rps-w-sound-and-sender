name: Dependabot Auto-merge (Cron)

on:
  schedule:
    # Run daily at 20:00 UTC
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  check-aged-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/cron@0c76ac0afb22cc9f83af08ac65673e609be3ac62 # v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
