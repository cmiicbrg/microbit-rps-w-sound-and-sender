name: Dependabot Auto-merge (Cron)

on:
  schedule:
    # Run daily at 20:00 UTC
    - cron: '0 20 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  check-aged-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/cron@a221277d51fb80ee2a6ba76df53eb302706d2e3f # v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
