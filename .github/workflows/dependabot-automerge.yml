name: Dependabot Auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/merge@473279c6de28189812f4913a62a5feae497bbbba # v1.7.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
