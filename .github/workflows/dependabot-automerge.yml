name: Dependabot Auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/merge@6da55a5ce4f786ac1ec1c84b997b713ce28178c2 # v2.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
