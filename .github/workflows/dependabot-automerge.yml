name: Dependabot Auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/merge@3fa782b8001d74e4f492bd10c2516e44b379a6a3 # v1.8.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
