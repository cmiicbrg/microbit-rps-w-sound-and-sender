name: Dependabot Auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/merge@a221277d51fb80ee2a6ba76df53eb302706d2e3f # v1.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
