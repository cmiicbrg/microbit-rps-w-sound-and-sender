name: Dependabot Auto-merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: cmiic/dependabot-automation/merge@0c76ac0afb22cc9f83af08ac65673e609be3ac62 # v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
